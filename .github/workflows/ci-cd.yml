name: CI/CD Pipeline

on:
  push:
    branches: ["main"]


jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip install -r app/requirements.txt

      - name: Build Docker image
        run: docker build -t vuln-app ./app